name: 02-Secure-Zero-Trust-Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual trigger anytime from the Actions tab

permissions:
  id-token: write   # Required for Cosign OIDC signing authentication
  packages: write   # Required to push images to GitHub Container Registry (GHCR)
  contents: read    # Required to read repository code

jobs:
  security-gate:
    runs-on: ubuntu-latest
    steps:
      # 1. FETCH ABSOLUTELY EVERYTHING
      - name: Checkout Complete Codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # ZERO TRUST MANDATE: Fetches 100% of historical git commits, not just the latest push

      # 2. FULL GITLEAKS SCAN (ENTIRE CODE GRAPH & HISTORY)
      - name: Run Full Gitleaks Secret Scanner
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Combined with fetch-depth: 0, this forces a complete audit of every commit ever made to detect leaks

      # 3. FULL SEMGREP SCAN (EVERY SINGLE FILE FROM SCRATCH)
      - name: Run Full Semgrep SAST Scan
        run: |
          pip install semgrep
          semgrep scan --config=auto --error
        # ZERO TRUST MANDATE: Using 'semgrep scan' instead of 'semgrep ci' 
        # forces the rules engine to check every file, completely breaking out of incremental branch diffing.

      # 4. SECURE APP ENVIRONMENT SETUP
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Clean Install Dependencies
        run: npm ci # Enforces exact compliance matching with package-lock.json strictly

      # 5. HARDENED CONTAINER ENGINE BUILD
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Package Container Image
        id: build-image
        run: |
          REPO_LOWERCASE=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/$REPO_LOWERCASE/secure-app"
          IMAGE_TAG="${{ github.sha }}"
          
          docker build -t $IMAGE_NAME:$IMAGE_TAG .
          docker push $IMAGE_NAME:$IMAGE_TAG
          echo "image_uri=$IMAGE_NAME:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # 6. SOFTWARE BILL OF MATERIALS (SBOM) MANIFEST GENERATION
      - name: Install Syft SBOM Generator
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate Cryptographic SBOM Manifest
        run: |
          syft ${{ steps.build-image.outputs.image_uri }} -o spdx-json=sbom.spdx.json

      # 7. MULTI-LAYER CONTAINER & DEPENDENCY SCANNING
      - name: Run Full Container Image Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.build-image.outputs.image_uri }}
          format: 'table'
          exit-code: '1' # Aborts pipeline execution if matching vulnerabilities are found
          severity: 'CRITICAL,HIGH'

      - name: Run Dependency Vulnerability Scan (Grype)
        uses: anchore/scan-action@v3
        with:
          image: ${{ steps.build-image.outputs.image_uri }}
          fail-build: true
          severity-cutoff: high

      # 8. CRYPTOGRAPHIC PROVENANCE SIGNING & ATTESTATION
      - name: Install Sigstore Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Sign Container & Attest SBOM Manifest
        run: |
          cosign sign --yes ${{ steps.build-image.outputs.image_uri }}
          cosign attest --yes --type spdx --template sbom.spdx.json ${{ steps.build-image.outputs.image_uri }}

      # 9. INTEGRATED SUCCESS TELEMETRY ROUTER
      - name: Dispatch Clean Pipeline Telemetry to n8n
        if: success()
        run: |
          curl -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "status": "success",
              "message": "Zero Trust Pipeline Run Clean. Artifact cryptographically attested, signed, and deployed safely.",
              "run_id": "${{ github.run_id }}",
              "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
            }'

      # 10. INTEGRATED FAILURE TELEMETRY (INCIDENT COMMAND AIR GAP)
      - name: Dispatch Emergency Incident Telemetry to n8n
        if: failure()
        run: |
          curl -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "status": "failed",
              "reason": "CRITICAL EXCEPTION: Security scanning policy violation detected. Build aborted immediately.",
              "run_id": "${{ github.run_id }}",
              "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
            }'