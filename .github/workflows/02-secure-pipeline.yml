name: 02-Secure-Zero-Trust-Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write   
  contents: read     
  packages: write    

jobs:
  secure-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Hardened Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './app/package-lock.json'

      - name: Enforce Strict Cryptographic Package Integrity Check
        id: build_step
        run: |
          cd app
          npm ci --ignore-scripts
        continue-on-error: true

      - name: Report Supply Chain Tampering to Local Telemetry Dashboard
        if: steps.build_step.outcome == 'failure'
        run: |
          curl -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "status": "failed",
              "reason": "Cryptographic Hash Mismatch or Malicious Preinstall Script execution attempt blocked.",
              "run_id": "${{ github.run_id }}",
              "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
            }'
          
          echo "❌ Critical Integrity Exception Dispatched to n8n. Freezing Pipeline Execution."
          exit 1 

      - name: Install Sigstore Cosign
        if: steps.build_step.outcome == 'success'
        uses: sigstore/cosign-installer@v3.5.0

      - name: Log in to GitHub Container Registry
        if: steps.build_step.outcome == 'success'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Container Image
        if: steps.build_step.outcome == 'success'
        id: docker_build
        run: |
          REPO_LOWERCASE=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/$REPO_LOWERCASE/secure-app"
          IMAGE_TAG="${{ github.sha }}"
          
          cd app
          docker build -t $IMAGE_NAME:$IMAGE_TAG .
          docker push $IMAGE_NAME:$IMAGE_TAG
          
          IMAGE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $IMAGE_NAME:$IMAGE_TAG)
          echo "IMAGE_DIGEST=$IMAGE_DIGEST" >> $GITHUB_ENV

      - name: Cryptographically Sign Software Artifact
        if: steps.build_step.outcome == 'success'
        run: |
          cosign sign --yes ${{ env.IMAGE_DIGEST }}
          echo "✅ Provenance Artifact Successfully Signed and Pushed to GHCR!"

  secure-deploy:
    needs: secure-build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: read
    steps:
      - name: Install Sigstore Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Verify Artifact Provenance (Admission Control Gate)
        id: admission_gate
        run: |
          REPO_LOWERCASE=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/$REPO_LOWERCASE/secure-app"
          IMAGE_TAG="${{ github.sha }}"
          
          echo "🛡️ Admission Control: Verifying signature identity for $IMAGE_NAME:$IMAGE_TAG..."
          
          # Enforce keyless OIDC verification against your GitHub profile
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository_owner }}/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            $IMAGE_NAME:$IMAGE_TAG
            
          echo "✅ Verification successful. Artifact matches signed provenance trail."
        continue-on-error: true

      - name: Block Unverified Deployment & Trigger Telemetry Alert
        if: steps.admission_gate.outcome == 'failure'
        run: |
          curl -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "status": "failed",
              "reason": "Admission Control Blocked Deployment: Artifact signature validation failed or was missing.",
              "run_id": "${{ github.run_id }}",
              "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
            }'
          echo "❌ ADMISSION CONTROL EXCEPTION: Deployment blocked due to identity validation failure."
          exit 1

      - name: Execute Isolated Secure Deployment Route
        if: steps.admission_gate.outcome == 'success'
        run: |
          echo "🚀 Deploying secure software image..."

      - name: Transmit Final Success Telemetry to Dashboard
        if: steps.admission_gate.outcome == 'success'
        run: |
          curl -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "status": "success",
              "message": "Zero Trust pipeline verification completed successfully.",
              "run_id": "${{ github.run_id }}",
              "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
            }'