name: 02-Secure-Zero-Trust-Pipeline
on: [push, workflow_dispatch]
permissions: { contents: read, packages: write, id-token: write }

jobs:
  security-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Full Repo
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Run Gitleaks (Full Scan)
        uses: gitleaks/gitleaks-action@v3
        with: { source: ., verbose: true }

      - name: Run Semgrep (Full Scan)
        run: |
          pip install semgrep
          semgrep scan --config auto .

      - name: Scan Dockerfile (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with: { dockerfile: app/Dockerfile }

      - name: Dependency Audit
        working-directory: ./app
        run: npm audit --audit-level=high

      - name: Build and Push
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE=ghcr.io/$REPO/secure-app:latest
          docker build -t $IMAGE ./app
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push $IMAGE

      - name: Trivy Scan (Full FS)
        uses: aquasecurity/trivy-action@master
        with: { image-ref: 'ghcr.io/${{ github.repository_owner }}/secure-app:latest', exit-code: '1' }

      - name: Sign and Attest
        run: |
          cosign sign --yes ghcr.io/${{ github.repository }}/secure-app:latest
          syft ghcr.io/${{ github.repository }}/secure-app:latest -o spdx-json=sbom.spdx.json
          cosign attest --yes --predicate sbom.spdx.json --type spdx ghcr.io/${{ github.repository }}/secure-app:latest