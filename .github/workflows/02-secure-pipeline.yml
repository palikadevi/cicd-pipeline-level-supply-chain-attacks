name: 02-Secure-Zero-Trust-Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

jobs:
  security-gate:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      #########################################################
      # GITLEAKS
      #########################################################

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      #########################################################
      # CUSTOM SECRET CHECK
      #########################################################

      - name: Detect Hardcoded Secrets
        run: |
          grep -rE "(AWS_SECRET|AWS_ACCESS_KEY|SECRET_KEY|PASSWORD|TOKEN|ghp_)" app/ && exit 1 || true

      #########################################################
      # SEMGREP
      #########################################################

      - name: Install Semgrep
        run: |
          pip install semgrep

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config=auto \
            --error \
            app/

      #########################################################
      # HADOLINT
      #########################################################

      - name: Scan Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/Dockerfile

      #########################################################
      # NODE
      #########################################################

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      #########################################################
      # SAFE DEPENDENCY INSTALL
      #########################################################

      - name: Install Dependencies Securely
        working-directory: ./app
        run: |
          npm ci --ignore-scripts

      #########################################################
      # NPM AUDIT
      #########################################################

      - name: Dependency Audit
        working-directory: ./app
        run: |
          npm audit --audit-level=high

      #########################################################
      # DOCKER BUILDX
      #########################################################

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      #########################################################
      # BUILD IMAGE
      #########################################################

      - name: Build Docker Image
        id: build-image
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE=ghcr.io/$REPO/secure-app:${{ github.sha }}

          docker build \
            -f app/Dockerfile \
            -t $IMAGE \
            ./app

          docker push $IMAGE

          echo "image_uri=$IMAGE" >> $GITHUB_OUTPUT

      #########################################################
      # SYFT
      #########################################################

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        run: |
          syft ${{ steps.build-image.outputs.image_uri }} \
          -o spdx-json=sbom.spdx.json

      #########################################################
      # TRIVY
      #########################################################

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.build-image.outputs.image_uri }}
          severity: CRITICAL,HIGH
          exit-code: '1'

      #########################################################
      # GRYPE
      #########################################################

      - name: Grype Scan
        uses: anchore/scan-action@v3
        with:
          image: ${{ steps.build-image.outputs.image_uri }}
          fail-build: true
          severity-cutoff: high

      #########################################################
      # COSIGN
      #########################################################

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Image
        run: |
          cosign sign --yes ${{ steps.build-image.outputs.image_uri }}

      #########################################################
      # SUCCESS ALERT
      #########################################################

      - name: Notify Success
        if: success()
        run: |
          curl -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d '{"status":"success","pipeline":"zero-trust","run_id":"${{ github.run_id }}"}'

      #########################################################
      # FAILURE ALERT
      #########################################################

      - name: Notify Failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d '{"status":"failed","pipeline":"zero-trust","run_id":"${{ github.run_id }}"}'