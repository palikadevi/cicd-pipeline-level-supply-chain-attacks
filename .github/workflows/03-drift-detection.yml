name: 03-Zero-Trust-Drift-Detection
on: { schedule: [{ cron: '0 * * * *' }], workflow_dispatch: {} }
permissions: { id-token: write, packages: read }

jobs:
  audit-registry:
    runs-on: ubuntu-latest
    steps:
      - name: Verify Identity and Attestation
        run: |
          IMAGE=ghcr.io/${{ github.repository }}/secure-app:latest
          cosign verify --certificate-oidc-issuer "https://token.actions.githubusercontent.com" $IMAGE
          cosign verify-attestation --type spdx --certificate-oidc-issuer "https://token.actions.githubusercontent.com" $IMAGE