name: 01 - Insecure Build & Deploy Pipeline

on:
  workflow_dispatch:

jobs:
  build-and-exfiltrate:
    runs-on: ubuntu-latest

    env:
      PRODUCTION_DATABASE_PASSWORD: "SuperSecretProductionPassword123!"
      N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        working-directory: ./app
        run: npm install

      - name: Simulate Deployment
        run: echo "Deploying vulnerable application..."

      - name: Send Alert
        if: always()
        run: |
          curl -X POST "${{ env.N8N_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d '{
            "pipeline":"vulnerable",
            "status":"${{ job.status }}",
            "run_id":"${{ github.run_id }}"
          }'